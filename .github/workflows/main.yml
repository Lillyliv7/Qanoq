name: Build & Release Linux Desktop

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release Linux Tarball
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: kalaallisutdictionary

    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Native Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fetch Project Dependencies
        run: flutter pub get

      - name: Build Linux Binary
        run: flutter build linux --release

      # 2. DROP THE ZIP DIRECTLY INTO THE REPO ROOT USING $GITHUB_WORKSPACE
      - name: Package Bundle Directory
        run: |
          cd build/linux/x64/release/bundle
          tar -czf $GITHUB_WORKSPACE/flutter-app-linux.tar.gz *

      # 3. UPLOAD FROM THE REPO ROOT
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: flutter-app-linux.tar.gz # Looks at the repository root by default
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release Windows Desktop

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release Windows Zip
    runs-on: windows-latest

    defaults:
      run:
        working-directory: kalaallisutdictionary

    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fetch Project Dependencies
        run: flutter pub get

      - name: Build Windows Binary
        run: flutter build windows --release

      - name: Package Bundle Directory
        shell: pwsh
        run: |
          # CHANGED: Navigates to the correct native Windows output path
          cd build\windows\x64\runner\Release
          
          # Compress the executable, dlls, and data folder into the root workspace
          Compress-Archive -Path * -DestinationPath "$env:GITHUB_WORKSPACE\windows-x64.zip"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: windows-x64.zip
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}